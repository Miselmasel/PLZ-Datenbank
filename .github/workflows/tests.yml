name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Testabhängigkeiten installieren
        run: pip install pytest

      - name: schema.sql syntaktisch prüfen
        run: |
          python -c "
          import sqlite3, pathlib
          sqlite3.connect(':memory:').executescript(pathlib.Path('schema.sql').read_text(encoding='utf-8'))
          print('schema.sql laesst sich fehlerfrei ausfuehren')
          "

      - name: Unit-Tests ausführen
        run: python -m pytest -v

      - name: Skript-Syntax prüfen (Byte-Compile)
        run: python -m py_compile import_plz_data.py
