name: Datenbank aktualisieren

# Läuft automatisch nach Zeitplan (Standard: jeden Montag 04:00 UTC / 05:00-06:00
# MEZ/MESZ, je nach Sommerzeit) und lässt sich zusätzlich jederzeit manuell über
# "Run workflow" im Actions-Tab starten. Die PLZ-Zuordnung ändert sich selten,
# daher reicht ein wöchentlicher Rhythmus - bei Bedarf im cron-Ausdruck anpassen
# (z.B. "0 4 1 * *" für monatlich, "0 4 * * *" für täglich).
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Datenbank aktualisieren
        id: update
        run: python update_plz_datenbank.py
        continue-on-error: true

      - name: Ergebnis des Updates prüfen
        run: |
          if [ "${{ steps.update.outcome }}" = "failure" ]; then
            echo "::warning::Update-Skript ist fehlgeschlagen oder wurde sicherheitshalber abgebrochen - siehe update_log.jsonl"
          fi

      - name: Änderungen committen, falls vorhanden
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plz_datenbank.sqlite3 update_log.jsonl
          if git diff --cached --quiet; then
            echo "Keine Änderungen zum Committen."
          else
            git commit -m "Automatisches PLZ-Datenbank-Update ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Log als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: update-log
          path: update_log.jsonl
          retention-days: 90

      - name: Bei fehlgeschlagenem/abgebrochenem Update den Workflow als fehlgeschlagen markieren
        if: steps.update.outcome == 'failure'
        run: exit 1
